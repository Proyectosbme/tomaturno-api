# =========================
# Puerto y contexto HTTP
# =========================
quarkus.http.port=8085
quarkus.banner.path=banner.txt

# Escuchar en todas las IPs
quarkus.http.host=192.168.1.132

# =========================
# Base de datos PostgreSQL
# =========================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:quarkus}
quarkus.datasource.password=${DB_PASS:quarkus}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:qurakuskafka}
quarkus.hibernate-orm.database.default-schema=${DB_SCHEMA:kafka}

# =========================
# Hibernate
# =========================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.sql-load-script=no-file

quarkus.http.cors=false

# =========================
# Keycloak Admin Client
# =========================
quarkus.keycloak.admin-client.server-url=${KC_SERVER_URL:http://localhost:9095}
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.grant-type=PASSWORD
quarkus.keycloak.admin-client.username=${KC_ADMIN_USER:admin}
quarkus.keycloak.admin-client.password=${KC_ADMIN_PASS:admin}
tomaturno.keycloak.realm=tomaturno

# =========================
# OIDC (autenticacion JWT)
# =========================
quarkus.oidc.auth-server-url=http://localhost:9095/realms/tomaturno
quarkus.oidc.client-id=quarkus-client
quarkus.oidc.credentials.secret=OGOd7fZaQdq7l8cxqSqCZFgkQ9793YgA
quarkus.oidc.application-type=service

# Keycloak esta corriendo — OIDC habilitado tambien en dev
%dev.quarkus.oidc.auth-server-url=http://localhost:9095/realms/tomaturno

