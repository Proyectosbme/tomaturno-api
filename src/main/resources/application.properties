# =========================
# Puerto y contexto HTTP
# =========================
quarkus.http.port=${HTTP_PORT}
quarkus.banner.path=banner.txt
quarkus.http.host=${HTTP_HOST}

# =========================
# Base de datos PostgreSQL
# =========================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASS}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
quarkus.hibernate-orm.database.default-schema=${DB_SCHEMA}

# =========================
# Hibernate
# =========================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.sql-load-script=no-file

quarkus.http.cors=${HTTP_CORS}

# =========================
# Keycloak Admin Client
# =========================
quarkus.keycloak.admin-client.server-url=${KC_SERVER_URL}
quarkus.keycloak.admin-client.realm=${KC_ADMIN_REALM}
quarkus.keycloak.admin-client.client-id=${KC_ADMIN_CLIENT_ID}
quarkus.keycloak.admin-client.grant-type=PASSWORD
quarkus.keycloak.admin-client.username=${KC_ADMIN_USER}
quarkus.keycloak.admin-client.password=${KC_ADMIN_PASS}
tomaturno.keycloak.realm=${KC_REALM}

# =========================
# OIDC (autenticacion JWT)
# =========================
quarkus.oidc.auth-server-url=${KC_SERVER_URL}/realms/${KC_REALM}
quarkus.oidc.client-id=${OIDC_CLIENT_ID}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}
quarkus.oidc.application-type=service

# Keycloak esta corriendo — OIDC habilitado tambien en dev
%dev.quarkus.oidc.auth-server-url=${KC_SERVER_URL}/realms/${KC_REALM}
